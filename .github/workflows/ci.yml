name: Continuous Integration

on:
  push:
    branches: [ master ]
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest] # Windows-latest temporarily excluded for R/Python setup complexity
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install pandas matplotlib

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("ggplot2", "svglite", "jsonlite"))'

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests (including ignored integration tests)
        run: cargo test --workspace -- --ignored

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run unit tests (excluding R/Python)
        run: cargo test --workspace --exclude knot-cli


  vscode-extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Compile extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Verify package can be created
        working-directory: editors/vscode
        run: |
          npm install -g @vscode/vsce
          vsce package --out test.vsix
